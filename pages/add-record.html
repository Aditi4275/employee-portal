<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Employee Record</title>
        <link rel="stylesheet" href="../css/common.css">
        <link rel="stylesheet" href="../css/addRecord.css">
    </head>
    <body>
        <div class="page-wrapper">
            <div class="header-bar"></div>
            <div class="record-container">
                <div class="record-card fade-in">
                    <h2 id="form-title">Add Employee</h2>

                    <div class="form-group horizontal">
                        <label for="emp-name">Name</label>
                        <input type="text" class="form-input" id="emp-name" placeholder="Enter name">
                    </div>

                    <div class="form-group horizontal">
                        <label for="emp-email">Email</label>
                        <input type="email" class="form-input" id="emp-email" placeholder="Enter email">
                    </div>

                    <div class="form-group horizontal">
                        <label for="emp-dept">Department</label>
                        <select class="form-select" id="emp-dept">
                            <option value="" disabled selected>Select department</option>
                            <option value="Engineering">Engineering</option>
                            <option value="Marketing">Marketing</option>
                            <option value="HR">HR</option>
                            <option value="Finance">Finance</option>
                        </select>
                    </div>

                    <div class="form-group horizontal">
                        <label for="emp-salary">Salary</label>
                        <input type="text" class="form-input" id="emp-salary" placeholder="Enter salary">
                    </div>

                    <div class="error-message" id="record-error"></div>

                    <div class="record-actions">
                        <button class="btn" id="cancel-btn">Cancel</button>
                        <button class="btn btn-primary" id="save-btn">Save</button>
                    </div>

                </div>
            </div>
        </div>
        <script src="../src/common.js"></script>
        <script src="../src/add-record.js"></script>
    </body>
</html>
