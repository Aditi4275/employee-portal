<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Reset Password</title>
        <link rel="stylesheet" href="../css/common.css">
        <link rel="stylesheet" href="../css/forgotPassword.css">
    </head>
    <body>
        <div class="page-wrapper">
            <div class="header-bar"></div>

            <div class="forgot-container">
                <div class="forgot-card fade-in">
                    <h2>Reset Password</h2>

                    <div class="form-group horizontal">
                        <label for="email">Email</label>
                        <input type="email" class="form-input" id="email" placeholder="Enter email">
                    </div>

                    <div class="form-group horizontal">
                        <label for="current-password">Current Password</label>
                        <input type="password" class="form-input" id="current-password" placeholder="Enter current password">
                    </div>

                    <div class="form-group horizontal">
                        <label for="new-password">New Password</label>
                        <input type="password" class="form-input" id="new-password" placeholder="Enter new password">
                    </div>

                    <div class="error-message" id="forgot-error"></div>

                    <div class="error-message" id="new-password-error"></div>

                    <div class="forgot-actions">
                        <button class="btn" id="cancel-btn">Cancel</button>
                        <button class="btn btn-primary" id="save-btn">Save</button>
                    </div>
                </div>
            </div>
        </div>
        <script src="../src/common.js"></script>
        <script src="../src/forgot_password.js"></script>
    </body>
</html>
